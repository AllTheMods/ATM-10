name: Build Modpack

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Prepare overrides directory
      run: |
        mkdir -p overrides
        mv config datapacks defaultconfigs kubejs local mods overrides/

    - name: Upload modpack files
      uses: actions/upload-artifact@v4
      with:
        name: modpack
        path: |
          overrides/**
          packmenu/**
          changelogs/**
          README.md
          manifest.json
          CHANGELOG.md
