[machineSettings]
#Whether addon bonuses are added additive or multiplicative
additiveAddons = true
#When enabled, machine core quality determines how many layers of machine extenders can be used. If false, it's the direct amount.
layeredExtenders = false
#Applies to the destroyer block and enderic laser. Lower = hardness has a lower effect on speed.
# Default: 0.5
# Range: 0.0 ~ 10.0
blockBreakHardnessExponentialFactor = 0.5

[machineSettings.processingMachines]
#Maximum machine frame chain length
# Default: 64
# Range: > 1
machineFrameMaxLength = 64

[machineSettings.processingMachines.assemblerData]
# Default: 50000
# Range: 0 ~ 9223372036854775807
energyCapacity = 50000
# Default: 1024
# Range: 0 ~ 9223372036854775807
maxEnergyInsertion = 1024
# Default: 0
# Range: 0 ~ 9223372036854775807
maxEnergyExtraction = 0
# Default: 128
# Range: > 0
energyPerTick = 128

[machineSettings.processingMachines.atomicForgeData]
# Default: 1024
# Range: 0 ~ 9223372036854775807
energyCapacity = 1024
# Default: 0
# Range: 0 ~ 9223372036854775807
maxEnergyInsertion = 0
# Default: 0
# Range: 0 ~ 9223372036854775807
maxEnergyExtraction = 0
# Default: 1024
# Range: > 0
energyPerTick = 1024
